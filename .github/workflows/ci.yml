name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system .[server] ruff

      - name: Ruff check
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system .[server] pytest pytest-asyncio httpx

      - name: Run tests
        env:
          JWT_SECRET_KEY: test_secret_key
          ENCRYPTION_KEY: w2PlUngQ0X5vsF2BQdIQ0-29yHJ_B72UbKVKW15qBI4=
        run: pytest tests/ -v --tb=short
