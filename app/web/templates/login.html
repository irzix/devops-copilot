{% extends "base.html" %}

{% block layout %}
<div class="flex items-center" style="justify-content: center; height: 100vh; width: 100vw; background: var(--bg-dark);">
    <div class="card" style="width: 400px; max-width: 90%;" x-data="{
        username: '',
        password: '',
        error: '',
        async submit() {
            this.error = '';
            const res = await fetch('/api/v1/auth/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ username: this.username, password: this.password })
            });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                window.location.href = '/';
            } else {
                this.error = 'Invalid credentials';
            }
        }
    }">
        <h2 style="margin-top:0; text-align:center;">Login to Copilot</h2>
        
        <div class="mb-4">
            <label class="text-muted" style="display:block; margin-bottom:0.5rem;">Username</label>
            <input type="text" x-model="username" class="chat-input" @keyup.enter="submit">
        </div>
        
        <div class="mb-4">
            <label class="text-muted" style="display:block; margin-bottom:0.5rem;">Password</label>
            <input type="password" x-model="password" class="chat-input" @keyup.enter="submit">
        </div>

        <template x-if="error">
            <div class="mb-4 text-danger" style="color: var(--danger);" x-text="error"></div>
        </template>
        
        <button class="btn" style="width: 100%;" @click="submit">Login</button>
    </div>
</div>
{% endblock %}
